[mypy]
# Strict mode - enables all optional checks
strict = true

# Import discovery
mypy_path = src
packages = lats
namespace_packages = true

# Platform configuration
python_version = 3.12
platform = darwin

# Output configuration
show_error_codes = true
show_error_context = true
show_column_numbers = true
pretty = true
color_output = true

# Strictness flags (explicit for documentation)
disallow_any_unimported = true
disallow_any_expr = false  # Too strict for LangChain
disallow_any_decorated = false  # LangChain uses decorators
disallow_any_explicit = false  # Allow explicit Any when needed
disallow_any_generics = true
disallow_subclassing_any = true

# Untyped definitions
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true

# None and Optional
no_implicit_optional = true
strict_optional = true

# Warnings
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_return_any = true
warn_unreachable = true

# Error messages
show_none_errors = true
strict_equality = true
strict_concatenate = true

# Miscellaneous
warn_unused_configs = true
no_implicit_reexport = true
namespace_packages = true

# Per-module options for third-party libraries
[mypy-langchain.*]
ignore_missing_imports = true

[mypy-langchain_openai.*]
ignore_missing_imports = true

[mypy-langchain_community.*]
ignore_missing_imports = true

[mypy-langgraph.*]
ignore_missing_imports = true

[mypy-tavily.*]
ignore_missing_imports = true

[mypy-structlog.*]
ignore_missing_imports = true

[mypy-hypothesis.*]
ignore_missing_imports = true
